<!DOCTYPE html>

        textarea.input { resize: vertical; min-height: 60px; }

        .nav-item { color: #8e8e93; padding: 10px 14px; cursor: pointer; border-radius: 8px; margin: 2px 8px; transition: all .15s; font-size: 13px; display: flex; align-items: center; gap: 10px; }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;
        const { BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, AreaChart, Area } = Recharts;

        const API_BASE = '/admin/api';
        let authToken = localStorage.getItem('vinosomm_token') || null;

        async function api(path, opts = {}) {
            const headers = { 'Content-Type': 'application/json', ...opts.headers };
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            const resp = await fetch(`${API_BASE}${path}`, { ...opts, headers });
            if (resp.status === 401) { authToken = null; localStorage.removeItem('vinosomm_token'); throw new Error('Unauthorized'); }
            if (!resp.ok) { const err = await resp.json().catch(() => ({})); throw new Error(err.detail || `HTTP ${resp.status}`); }
            return resp.json();
        }

        let toastTimeout = null;
        function showToast(msg, type = 'info') {
            const el = document.getElementById('toast');
            if (!el) return;
            el.textContent = type === 'error' ? '\u2715 ' + msg : type === 'success' ? '\u2713 ' + msg : '\u2139 ' + msg;
            el.style.display = 'block';
            el.style.borderColor = type === 'error' ? '#ef4444' : type === 'success' ? '#34d399' : '#0a84ff';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(function() { el.style.display = 'none'; }, 3000);
        }

        // ============================================================

        // ============================================================

        const DEFAULT_VISIBLE = ['name', 'producer', 'wine_type', 'country', 'vintage', 'grape_variety', 'rating', 'price', 'completeness', 'alcohol', 'enrichment_status'];
        const DEFAULT_VINEYARD_VISIBLE = ['name', 'country', 'region', 'producer_type', 'grape_varieties', 'vineyard_hectares', 'avg_rating', 'farming_practice', 'quality_tier', 'completeness', 'enrichment_status'];

        function getColumnConfig(storageKey) {
            if (!storageKey) storageKey = 'vinosomm_columns';
            try {
                const saved = localStorage.getItem(storageKey);
                if (saved) return JSON.parse(saved);
            } catch(e) {}
            const allCols = storageKey === 'vinosomm_vineyard_columns' ? ALL_VINEYARD_COLUMNS : ALL_COLUMNS;
            const defaultVis = storageKey === 'vinosomm_vineyard_columns' ? DEFAULT_VINEYARD_VISIBLE : DEFAULT_VISIBLE;
            return { visible: defaultVis, order: allCols.map(function(c) { return c.key; }) };
        }

        function saveColumnConfig(cfg, storageKey) {
            if (!storageKey) storageKey = 'vinosomm_columns';
            localStorage.setItem(storageKey, JSON.stringify(cfg));
        }

        function formatCell(value, format) {
            if (value == null || value === '') return '\u2014';
            switch(format) {
                case 'number': return value;
                case 'decimal': return typeof value === 'number' ? value.toFixed(1) : value;
                case 'percent': return typeof value === 'number' ? value.toFixed(1) + '%' : value;
                case 'price': return typeof value === 'number' ? '$' + value.toFixed(2) : value;
                case 'rating': return typeof value === 'number' ? '\u2605 ' + value.toFixed(1) : value;
                case 'badge': return value;
                case 'boolean': return value ? 'Yes' : 'No';
                case 'date': return value ? new Date(value).toLocaleDateString() : '\u2014';
                default: return String(value);
            }
        }

        // ============================================================
        // LOGIN
        // ============================================================
        function LoginScreen({ onLogin }) {
            const [user, setUser] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [err, setErr] = useState('');
            const submit = function(e) {
                e.preventDefault(); setLoading(true); setErr('');
                api('/auth/login', { method: 'POST', body: JSON.stringify({ username: user, password: pass }) }).then(function(data) {
                    authToken = data.access_token; localStorage.setItem('vinosomm_token', authToken); onLogin();
                }).catch(function(ex) { setErr(ex.message); }).finally(function() { setLoading(false); });
            };
            return (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' }}>
                    <form onSubmit={submit} style={{ width: 320, textAlign: 'center' }}>
                        <div style={{ fontSize: 32, fontWeight: 700, color: '#fff', marginBottom: 4 }}>vinosomm.ai</div>
                        <div style={{ color: '#8e8e93', fontSize: 14, marginBottom: 32 }}>Admin Panel</div>
                        <div className="form-group"><input className="input" placeholder="Username" value={user} onChange={function(e){ setUser(e.target.value); }} autoFocus /></div>

        // ============================================================
        // REUSABLE COLUMN CONFIG MODAL
        // ============================================================
        function ColumnConfigModal({ allColumns, allColumnsRef, defaultVisible, storageKey, config, onSave, onClose }) {
            const [visible, setVisible] = useState(new Set(config.visible));
            const [order, setOrder] = useState(config.order);
            const [dragIdx, setDragIdx] = useState(null);
            const [dragOverIdx, setDragOverIdx] = useState(null);

            const colArray = allColumnsRef || allColumns;
            const groups = useMemo(function() {
                const g = {};
                order.forEach(function(key) {
                    const col = colArray.find(function(c) { return c.key === key; });
                    if (!col) return;
                    if (!g[col.group]) g[col.group] = [];
                    g[col.group].push(col);
                });
                return g;
            }, [order, colArray]);

            const toggle = function(key) {
                const next = new Set(visible);
                if (next.has(key)) next.delete(key); else next.add(key);
                setVisible(next);
            };

            const toggleGroup = function(groupName) {
                const groupKeys = colArray.filter(function(c) { return c.group === groupName; }).map(function(c) { return c.key; });
                const allOn = groupKeys.every(function(k) { return visible.has(k); });
                const next = new Set(visible);
                groupKeys.forEach(function(k) { if (allOn) next.delete(k); else next.add(k); });
                setVisible(next);
            };

            const save = function() {
                onSave({ visible: Array.from(visible), order });
                onClose();
            };

            const reset = function() {
                setVisible(new Set(defaultVisible));
                setOrder(colArray.map(function(c) { return c.key; }));
            };

            const selectAll = function() { setVisible(new Set(colArray.map(function(c) { return c.key; }))); };
            const selectNone = function() { setVisible(new Set(['name'])); };

            const onDragStart = function(idx) { setDragIdx(idx); };
            const onDragOver = function(e, idx) { e.preventDefault(); setDragOverIdx(idx); };
            const onDragEnd = function() {
                if (dragIdx !== null && dragOverIdx !== null && dragIdx !== dragOverIdx) {
                    const next = order.slice();
                    const item = next.splice(dragIdx, 1)[0];
                    next.splice(dragOverIdx, 0, item);
                    setOrder(next);
                }
                setDragIdx(null);
                setDragOverIdx(null);
            };

            const flatOrder = order.filter(function(k) { return colArray.find(function(c) { return c.key === k; }); });

            return (
                <div className="overlay" onClick={onClose}>
                    <div className="modal modal-wide" onClick={function(e){ e.stopPropagation(); }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                            <h3 style={{ margin: 0 }}>Configure Columns</h3>
                            <div style={{ display: 'flex', gap: 6 }}>
                                <button className="btn btn-sm btn-secondary" onClick={selectAll}>All</button>
                                <button className="btn btn-sm btn-secondary" onClick={selectNone}>None</button>
                                <button className="btn btn-sm btn-secondary" onClick={reset}>Reset</button>
                            </div>
                        </div>
                        <div style={{ fontSize: 12, color: '#8e8e93', marginBottom: 12 }}>Check columns to show. Drag to reorder. {visible.size} of {colArray.length} visible.</div>
                        <div className="col-config-list">
                            {flatOrder.map(function(key, idx) {
                                const col = colArray.find(function(c) { return c.key === key; });
                                if (!col) return null;
                                const prevCol = idx > 0 ? colArray.find(function(c) { return c.key === flatOrder[idx - 1]; }) : null;
                                const showGroupHeader = !prevCol || prevCol.group !== col.group;
                                return (
                                    <React.Fragment key={key}>
                                        {showGroupHeader && (
                                            <div className="col-config-group" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <span>{col.group}</span>
                                                <button className="btn btn-sm" style={{ padding: '2px 6px', fontSize: 10, background: 'rgba(255,255,255,.05)', color: '#8e8e93' }} onClick={function(){ toggleGroup(col.group); }}>Toggle</button>
                                            </div>
                                        )}
                                        <div
                                            className={'col-config-item' + (dragIdx === idx ? ' dragging' : '') + (dragOverIdx === idx ? ' drag-over' : '')}
                                            draggable
                                            onDragStart={function(){ onDragStart(idx); }}
                                            onDragOver={function(e){ onDragOver(e, idx); }}
                                            onDragEnd={onDragEnd}
                                        >
                                            <span className="col-grip">\u2630</span>
                                            <input type="checkbox" className="col-config-check" checked={visible.has(key)} onChange={function(){ toggle(key); }} disabled={key === 'name'} />
                                            <span className="col-config-label">{col.label}</span>
                                            <span style={{ fontSize: 10, color: '#636366' }}>{col.key}</span>
                                        </div>
                                    </React.Fragment>
                                );
                            })}
                        </div>
                        <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
                            <button className="btn btn-primary" style={{ flex: 1 }} onClick={save}>Apply</button>
                            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================
        function WinesPage() {
            const [wines, setWines] = useState([]);
            const [total, setTotal] = useState(0);
            const [page, setPage] = useState(1);
            const [totalPages, setTotalPages] = useState(1);
            const [search, setSearch] = useState('');
            const [typeFilter, setTypeFilter] = useState('');
            const [countryFilter, setCountryFilter] = useState('');
            const [sortBy, setSortBy] = useState('created_at');
            const [sortDir, setSortDir] = useState('desc');
            const [loading, setLoading] = useState(true);
            const [colConfig, setColConfig] = useState(function() { return getColumnConfig('vinosomm_columns'); });
            const [showColConfig, setShowColConfig] = useState(false);
            const [showEdit, setShowEdit] = useState(false);
            const [editWine, setEditWine] = useState(null);
            const [detailWine, setDetailWine] = useState(null);
            const [aiInput, setAiInput] = useState('');
            const [aiLoading, setAiLoading] = useState(false);
            const [aiData, setAiData] = useState(null);
            const [showAiModal, setShowAiModal] = useState(false);
            const searchTimeout = useRef(null);

            const visibleCols = useMemo(function() {
                const vis = new Set(colConfig.visible);
                return colConfig.order.filter(function(k) { return vis.has(k); }).map(function(k) { return ALL_COLUMNS.find(function(c) { return c.key === k; }); }).filter(Boolean);
            }, [colConfig]);

            const loadWines = useCallback(function() {
                setLoading(true);
                const params = new URLSearchParams({ page: page, per_page: 25, sort_by: sortBy, sort_dir: sortDir });
                if (search) params.set('search', search);
                if (typeFilter) params.set('wine_type', typeFilter);
                if (countryFilter) params.set('country', countryFilter);
                api('/wines?' + params).then(function(d) {
                    setWines(d.wines); setTotal(d.total); setTotalPages(d.total_pages);
                }).catch(function(e) { showToast(e.message, 'error'); }).finally(function() { setLoading(false); });
            }, [page, search, typeFilter, countryFilter, sortBy, sortDir]);

            useEffect(function() { loadWines(); }, [loadWines]);

            const handleSearch = function(val) {
                setSearch(val); setPage(1);
                clearTimeout(searchTimeout.current);
            };

            const handleSort = function(key) {
                if (sortBy === key) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
                else { setSortBy(key); setSortDir('desc'); }
                setPage(1);
            };

            const handleAiDetect = function() {
                if (!aiInput.trim()) { showToast('Enter vineyard name or URL', 'error'); return; }
                setAiLoading(true);
                api('/ai-intake', { method: 'POST', body: JSON.stringify({ input: aiInput, entity_type: 'wine' }) })
                    .then(function(data) {
                        setAiData(data);
                        setShowAiModal(true);
                    })
                    .catch(function(e) { showToast(e.message, 'error'); })
                    .finally(function() { setAiLoading(false); });
            };

            const handleAiConfirmed = function() {
                setShowAiModal(false);
                setAiInput('');
                setAiData(null);
                loadWines();
            };

            return (
                <div>
                    <div style={{ marginBottom: 20 }}><h1 className="page-title">Wines</h1><div className="page-sub">Manage wine catalog</div></div>
                    <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
                        <div className="ai-intake-input-group" style={{ flex: 1, minWidth: 250 }}>
                            <input className="input ai-intake-input" placeholder="Type wine name or paste URL..." value={aiInput} onChange={function(e){ setAiInput(e.target.value); }} />
                            <button className="btn btn-primary" onClick={handleAiDetect} disabled={aiLoading}>{aiLoading ? 'Adding\u2026' : 'AI Add'}</button>
                        </div>
                        <select className="input" style={{ width: 150 }} value={typeFilter} onChange={function(e){ setTypeFilter(e.target.value); setPage(1); }}><option value="">All Types</option><option value="red">Red</option><option value="white">White</option><option value="sparkling">Sparkling</option><option value="ros\u00e9">Ros\u00e9</option><option value="fortified">Fortified</option><option value="dessert">Dessert</option></select>
                        <select className="input" style={{ width: 150 }} value={countryFilter} onChange={function(e){ setCountryFilter(e.target.value); setPage(1); }}><option value="">All Countries</option><option value="France">France</option><option value="Italy">Italy</option><option value="Spain">Spain</option><option value="USA">USA</option></select>
                        <button className="btn btn-secondary" onClick={function(){ setShowColConfig(true); }}>Columns</button>
                        <button className="btn btn-secondary btn-sm" onClick={function(){ setEditWine({}); setShowEdit(true); }}>+ Add</button>
                    </div>
                    <div className="card" style={{ overflow: 'auto', maxHeight: 'calc(100vh - 300px)' }}>
                        {loading ? <div className="loading">Loading wines</div> : wines.length === 0 ? <div className="empty">No wines found</div> : (
                            <table>
                                <thead>
                                    <tr>
                                        {visibleCols.map(function(col) {
                                            return (
                                                <th key={col.key} onClick={function(){ handleSort(col.key); }} style={{ cursor: 'pointer' }}>
                                                    {col.label} {sortBy === col.key && (sortDir === 'asc' ? '\u25b2' : '\u25bc')}
                                                </th>
                                            );
                                        })}
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {wines.map(function(wine) {
                                        return (
                                            <tr key={wine.id} onClick={function(){ setDetailWine(wine); }} style={{ cursor: 'pointer' }}>
                                                {visibleCols.map(function(col) {
                                                    let cellContent = null;
                                                    if (col.key === 'enrichment_status') {
                                                        const status = wine.enrichment_status || 'none';
                                                        let badgeClass = 'badge-gray';
                                                        let badgeText = 'No data';
                                                        if (status === 'queued') { badgeClass = 'badge-blue'; badgeText = 'Queued'; }
                                                        else if (status === 'enriching') { badgeClass = 'badge-yellow'; badgeText = 'Enriching...'; }
                                                        else if (status === 'enriched') { badgeClass = 'badge-green'; const pct = wine.completeness; badgeText = 'Enriched ' + (pct ? Math.round(pct) + '%' : ''); }
                                                        else if (status === 'failed') { badgeClass = 'badge-red'; badgeText = 'Failed'; }
                                                        cellContent = <span className={'badge ' + badgeClass}>{badgeText}</span>;
                                                    } else {
                                                        cellContent = formatCell(wine[col.key], col.format);
                                                    }
                                                    return (
                                                        <td key={col.key} style={{ maxWidth: col.width, overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                                            {cellContent}</td>
                                                    );
                                                })}
                                                <td onClick={function(e){ e.stopPropagation(); }} style={{ whiteSpace: 'nowrap' }}>
                                                    <button className="btn btn-sm btn-success" onClick={function() { const status = wine.enrichment_status; if (status === 'none' || status === 'failed') { setLoading(true); api('/admin/api/enrich/' + wine.id, { method: 'POST' }).then(function() { showToast('Enrichment started', 'success'); loadWines(); }).catch(function(e) { showToast(e.message, 'error'); }).finally(function() { setLoading(false); }); } else { showToast('Enrichment already in progress or completed', 'info'); } }} style={{ marginRight: 4 }}>Enrich</button>
                                                    <button className="btn btn-sm btn-secondary" onClick={function(){ setEditWine(wine); setShowEdit(true); }} style={{ marginRight: 4 }}>Edit</button>
                                                    <button className="btn btn-sm btn-danger" onClick={function(){ if (confirm('Delete this wine?')) { api('/wines/' + wine.id, { method: 'DELETE' }).then(function() { loadWines(); showToast('Wine deleted', 'success'); }).catch(function(e) { showToast(e.message, 'error'); }); } }}>Delete</button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>
                    {totalPages > 1 && (
                        <div className="pagination">
                            <button className="page-btn" disabled={page === 1} onClick={function(){ setPage(page - 1); }}>Prev</button>
                            {Array.from({length: totalPages}, function(_, i) { return i + 1; }).slice(Math.max(0, page - 2), Math.min(totalPages, page + 1)).map(function(p) {
                                return (<button key={p} className="page-btn" onClick={function(){ setPage(p); }} style={{ background: p === page ? 'rgba(10,132,255,.2)' : '', color: p === page ? '#0a84ff' : '' }}>{p}</button>);
                            })}
                            <button className="page-btn" disabled={page === totalPages} onClick={function(){ setPage(page + 1); }}>Next</button>
                        </div>
                    )}

                    {showColConfig && <ColumnConfigModal allColumns={ALL_COLUMNS} defaultVisible={DEFAULT_VISIBLE} storageKey="vinosomm_columns" config={colConfig} onSave={function(cfg) { setColConfig(cfg); saveColumnConfig(cfg, 'vinosomm_columns'); }} onClose={function(){ setShowColConfig(false); }} />}
                    {showEdit && <WineEditModal wine={editWine} onClose={function(){ setShowEdit(false); }} onSaved={function() { setShowEdit(false); loadWines(); }} />}
                    {detailWine && <WineDetailModal wine={detailWine} onClose={function(){ setDetailWine(null); }} onEdit={function(){ setDetailWine(null); setEditWine(detailWine); setShowEdit(true); }} onEnrich={function(){}} />}
                    {showAiModal && aiData && <AiIntakeModal entityType="wine" detectedData={aiData} onClose={function(){ setShowAiModal(false); }} onConfirm={handleAiConfirmed} />}
                </div>
            );
        }

                                                })}
                                                <td onClick={function(e){ e.stopPropagation(); }} style={{ whiteSpace: 'nowrap' }}>
                                                    <button className="btn btn-sm btn-success" onClick={function() { const status = vineyard.enrichment_status; if (status === 'none' || status === 'failed') { setLoading(true); api('/admin/api/vineyards/' + vineyard.id + '/enrich', { method: 'POST' }).then(function() { showToast('Enrichment started', 'success'); loadVineyards(); }).catch(function(e) { showToast(e.message, 'error'); }).finally(function() { setLoading(false); }); } else { showToast('Enrichment already in progress or completed', 'info'); } }} style={{ marginRight: 4 }}>Enrich</button>
                                                    <button className="btn btn-sm btn-secondary" onClick={function(){ setEditVineyard(vineyard); setShowEdit(true); }} style={{ marginRight: 4 }}>Edit</button>
                                                    <button className="btn btn-sm btn-danger" onClick={function(){ if (confirm('Delete this vineyard?')) { api('/vineyards/' + vineyard.id, { method: 'DELETE' }).then(function() { loadVineyards(); showToast('Vineyard deleted', 'success'); }).catch(function(e) { showToast(e.message, 'error'); }); } }}>Delete</button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>
                    {totalPages > 1 && (
                        <div className="pagination">
                            <button className="page-btn" disabled={page === 1} onClick={function(){ setPage(page - 1); }}>Prev</button>
                            {Array.from({length: totalPages}, function(_, i) { return i + 1; }).slice(Math.max(0, page - 2), Math.min(totalPages, page + 1)).map(function(p) {
                                return (<button key={p} className="page-btn" onClick={function(){ setPage(p); }} style={{ background: p === page ? 'rgba(10,132,255,.2)' : '', color: p === page ? '#0a84ff' : '' }}>{p}</button>);
                            })}
                            <button className="page-btn" disabled={page === totalPages} onClick={function(){ setPage(page + 1); }}>Next</button>
                        </div>
                    )}

                    {showColConfig && <ColumnConfigModal allColumns={ALL_VINEYARD_COLUMNS} defaultVisible={DEFAULT_VINEYARD_VISIBLE} storageKey="vinosomm_vineyard_columns" config={colConfig} onSave={function(cfg) { setColConfig(cfg); saveColumnConfig(cfg, 'vinosomm_vineyard_columns'); }} onClose={function(){ setShowColConfig(false); }} />}
                    {showEdit && <VineyardEditModal vineyard={editVineyard} onClose={function(){ setShowEdit(false); }} onSaved={function() { setShowEdit(false); loadVineyards(); }} />}
                    {detailVineyard && <VineyardDetailModal vineyard={detailVineyard} onClose={function(){ setDetailVineyard(null); }} onEdit={function(){ setDetailVineyard(null); setEditVineyard(detailVineyard); setShowEdit(true); }} />}
                    {showAiModal && aiData && <AiIntakeModal entityType="vineyard" detectedData={aiData} onClose={function(){ setShowAiModal(false); }} onConfirm={handleAiConfirmed} />}
                </div>
            );
        }

        // ============================================================
        // STUB PAGES
        // ============================================================
        function DashboardPage() { return (<div><h1 className="page-title">Dashboard</h1><div className="page-sub">Coming soon</div></div>); }
        function TasksPage() { return (<div><h1 className="page-title">Enrichment Tasks</h1><div className="page-sub">Task management coming soon</div></div>); }
        function CrawlerPage() { return (<div><h1 className="page-title">Crawler</h1><div className="page-sub">Crawler management coming soon</div></div>); }
        function ReviewPage() { return (<div><h1 className="page-title">Review Queue</h1><div className="page-sub">Review queue coming soon</div></div>); }
        function ChatPage() { return (<div><h1 className="page-title">AI Chat</h1><div className="page-sub">AI chat coming soon</div></div>); }
        function AnalyticsPage() { return (<div><h1 className="page-title">Analytics</h1><div className="page-sub">Analytics coming soon</div></div>); }
        function SettingsPage() { return (<div><h1 className="page-title">Settings</h1><div className="page-sub">Settings coming soon</div></div>); }
        function HealthPage() { return (<div><h1 className="page-title">System Health</h1><div className="page-sub">Health monitoring coming soon</div></div>); }

        // ============================================================
        // MAIN APP
        // ============================================================
        const NAV_ITEMS = [
            { id: 'dashboard', label: 'Dashboard', icon: '\ud83d\udcc8' },
            { id: 'wines', label: 'Wines', icon: '\ud83c\udf77' },
            { id: 'vineyards', label: 'Vineyards', icon: '\ud83c\udf3d' },
            { id: 'tasks', label: 'Tasks', icon: '\ud83d\udccb' },
            { id: 'review', label: 'Review', icon: '\u2705' },
            { id: 'crawler', label: 'Scheduler', icon: '\ud83d\udd0d' },
            { id: 'chat', label: 'Chat', icon: '\ud83d\udde3' },
            { id: 'analytics', label: 'Analytics', icon: '\ud83d\udcc9' },
            { id: 'health', label: 'Health', icon: '\ud83d\udcab' },
            { id: 'settings', label: 'Settings', icon: '\u2699\ufe0f' },
        ];

        function App() {
            const [auth, setAuth] = useState(!!authToken);
            const [tab, setTab] = useState('dashboard');

            const logout = function() {
                authToken = null;
                localStorage.removeItem('vinosomm_token');
                setAuth(false);
            };

            if (!auth) return <LoginScreen onLogin={function(){ setAuth(true); }} />;

            const pages = { dashboard: DashboardPage, wines: WinesPage, vineyards: VineyardsPage, tasks: TasksPage, crawler: CrawlerPage, review: ReviewPage, chat: ChatPage, analytics: AnalyticsPage, settings: SettingsPage, health: HealthPage };
            const Page = pages[tab] || DashboardPage;
            return (
                <div style={{ display: 'flex', height: '100vh' }}>
                    <div style={{ width: 190, minWidth: 190, background: '#0c0c0c', borderRight: '1px solid rgba(255,255,255,.06)', display: 'flex', flexDirection: 'column' }}>
                        <div style={{ padding: '18px 16px 12px', fontWeight: 700, fontSize: 15, color: '#fff' }}>vinosomm.ai</div>
                        <nav style={{ flex: 1, paddingTop: 4 }}>{NAV_ITEMS.map(function(n) { return (<div key={n.id} className={'nav-item ' + (tab === n.id ? 'active' : '')} onClick={function(){ setTab(n.id); }}><span>{n.icon}</span> {n.label}</div>); })}</nav>
                        <div style={{ padding: 12, borderTop: '1px solid rgba(255,255,255,.06)' }}><button className="btn btn-secondary btn-sm" style={{ width: '100%' }} onClick={logout}>Sign Out</button></div>
                    </div>
                    <div style={{ flex: 1, overflowY: 'auto', padding: 24 }}><Page /></div>
                    <div id="toast" className="toast" style={{ display: 'none' }}></div>
                </div>
            );
        }

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
