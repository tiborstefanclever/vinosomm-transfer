<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vinosomm.ai Admin</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .card { background: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 12px; padding: 16px; }
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #0a84ff; color: #fff; }
        .btn-danger { background: #ff453a; color: #fff; }
        .btn-secondary { background: #2c2c2e; color: #fff; }
        .btn-success { background: #30d158; color: #fff; }
        .btn-warning { background: #ff9f0a; color: #000; }
        input, select, textarea { background: #2c2c2e; border: 1px solid #3a3a3c; color: #fff; border-radius: 8px; padding: 8px 12px; font-size: 14px; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #0a84ff; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; color: #8e8e93; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2c2c2e; }
        td { padding: 10px 12px; border-bottom: 1px solid #1c1c1e; font-size: 14px; }
        tr:hover td { background: #1c1c1e; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }
        .badge-green { background: #0d3b1e; color: #30d158; }
        .badge-red { background: #3b0d0d; color: #ff453a; }
        .badge-yellow { background: #3b2d0d; color: #ff9f0a; }
        .badge-blue { background: #0d1f3b; color: #0a84ff; }
        .badge-gray { background: #2c2c2e; color: #8e8e93; }
        .stat-card { background: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 12px; padding: 16px; }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #8e8e93; margin-bottom: 4px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: #8e8e93; transition: all 0.2s; font-size: 14px; }
        .nav-item:hover { background: #1c1c1e; color: #fff; }
        .nav-item.active { background: #0a84ff22; color: #0a84ff; border-left: 3px solid #0a84ff; }
        .chat-msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
        .chat-user { background: #0a84ff; color: #fff; margin-left: auto; }
        .chat-ai { background: #2c2c2e; color: #fff; }
        .progress-bar { height: 6px; background: #2c2c2e; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ============================================================================
// API Helper
// ============================================================================
const API_BASE = '/admin/api';
async function api(endpoint, options = {}) {
    const token = localStorage.getItem('token');
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (res.status === 401) {
        localStorage.removeItem('token');
        window.location.hash = '#/login';
        throw new Error('Unauthorized');
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'API Error');
    return data;
}

// ============================================================================
// LOGIN PAGE
// ============================================================================
function LoginPage({ onLogin }) {
    const [username, setUsername] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);
    const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
            const data = await api('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ username, password }),
            });
            localStorage.setItem('token', data.access_token);
            onLogin(username);
        } catch (err) {
            setError(err.message || 'Login failed');
        }
        setLoading(false);
    };
    return (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
            <form onSubmit={handleSubmit} style={{ width: 340 }}>
                <h1 style={{ fontSize: 28, fontWeight: 300, textAlign: 'center', marginBottom: 4 }}>vinosomm.ai</h1>
                <p style={{ textAlign: 'center', color: '#8e8e93', marginBottom: 32 }}>Admin Panel</p>
                {error && <div style={{ background: '#3b0d0d', color: '#ff453a', padding: '8px 12px', borderRadius: 8, marginBottom: 12, fontSize: 13 }}>{error}</div>}
                <label style={{ fontSize: 13, color: '#8e8e93', marginBottom: 4, display: 'block' }}>Username</label>
                <input value={username} onChange={e => setUsername(e.target.value)} placeholder="Enter username" style={{ marginBottom: 16 }} />
                <label style={{ fontSize: 13, color: '#8e8e93', marginBottom: 4, display: 'block' }}>Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Enter password" style={{ marginBottom: 20 }} />
                <button type="submit" className="btn btn-primary" style={{ width: '100%', padding: 12, fontSize: 16 }} disabled={loading}>
                    {loading ? 'Signing in...' : 'Sign In'}
                </button>
            </form>
        </div>
    );
}

// ============================================================================
// DASHBOARD PAGE
// ============================================================================
function DashboardPage() {
    const [data, setData] = useState(null);
    const [health, setHealth] = useState(null);
    useEffect(() => {
        api('/dashboard').then(setData).catch(console.error);
        api('/system/health').then(setHealth).catch(console.error);
    }, []);
    if (!data) return <div style={{ padding: 20, color: '#8e8e93' }}>Loading dashboard...</div>;
    const taskStats = data.task_stats || {};
    return (
        <div>
            <h2 style={{ fontSize: 22, fontWeight: 600, marginBottom: 20 }}>Dashboard</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 20 }}>
                <div className="stat-card"><div className="stat-label">Total Wines</div><div className="stat-value">{data.total_wines}</div></div>
                <div className="stat-card"><div className="stat-label">Added Today</div><div className="stat-value">{data.wines_added_today}</div></div>
                <div className="stat-card"><div className="stat-label">Added This Week</div><div className="stat-value">{data.wines_added_this_week}</div></div>
                <div className="stat-card"><div className="stat-label">Avg Completeness</div><div className="stat-value">{Math.round(data.avg_completeness)}%</div></div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 20 }}>
                <div className="stat-card"><div className="stat-label">Tasks Queued</div><div className="stat-value" style={{ color: '#ff9f0a' }}>{taskStats.queued || 0}</div></div>
                <div className="stat-card"><div className="stat-label">Tasks Running</div><div className="stat-value" style={{ color: '#0a84ff' }}>{taskStats.running || 0}</div></div>
                <div className="stat-card"><div className="stat-label">Tasks Completed</div><div className="stat-value" style={{ color: '#30d158' }}>{taskStats.completed || 0}</div></div>
                <div className="stat-card"><div className="stat-label">Needs Review</div><div className="stat-value" style={{ color: '#ff453a' }}>{data.needs_review || 0}</div></div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
                <div className="card">
                    <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>Wines by Type</h3>
                    {Object.entries(data.wines_by_type || {}).map(([type, count]) => (
                        <div key={type} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid #2c2c2e' }}>
                            <span style={{ textTransform: 'capitalize' }}>{type}</span>
                            <span style={{ color: '#8e8e93' }}>{count}</span>
                        </div>
                    ))}
                </div>
                <div className="card">
                    <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>Wines by Country</h3>
                    {Object.entries(data.wines_by_country || {}).map(([country, count]) => (
                        <div key={country} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid #2c2c2e' }}>
                            <span>{country}</span>
                            <span style={{ color: '#8e8e93' }}>{count}</span>
                        </div>
                    ))}
                </div>
            </div>
            {health && (
                <div className="card">
                    <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>System Health</h3>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
                        {Object.entries(health.services || {}).map(([svc, info]) => (
                            <div key={svc} style={{ textAlign: 'center', padding: 8 }}>
                                <div style={{ fontSize: 20, marginBottom: 4 }}>{info.status === 'connected' ? '\u2705' : '\u274c'}</div>
                                <div style={{ fontSize: 12, textTransform: 'capitalize' }}>{svc}</div>
                            </div>
                        ))}
                    </div>
                </div>
            )}
        </div>
    );
}

// ============================================================================
// WINES PAGE
// ============================================================================
function WinesPage() {
    const [wines, setWines] = useState([]);
    const [total, setTotal] = useState(0);
    const [page, setPage] = useState(1);
    const [search, setSearch] = useState('');
    const [editWine, setEditWine] = useState(null);
    const [showAdd, setShowAdd] = useState(false);
    const perPage = 20;

    const load = useCallback(() => {
        let q = `/wines?page=${page}&per_page=${perPage}`;
        if (search) q += `&search=${encodeURIComponent(search)}`;
        api(q).then(d => { setWines(d.wines); setTotal(d.total); }).catch(console.error);
    }, [page, search]);
    useEffect(load, [load]);

    const handleEnrich = async (id) => {
        try {
            const r = await api(`/enrich/${id}`, { method: 'POST' });
            alert(`Enrichment ${r.status}: ${r.message}`);
            load();
        } catch (e) { alert('Error: ' + e.message); }
    };
    const handleDelete = async (id) => {
        if (!confirm('Delete this wine?')) return;
        await api(`/wines/${id}`, { method: 'DELETE' });
        load();
    };
    const handleFlag = async (id) => {
        await api(`/review/flag/${id}`, { method: 'POST', body: JSON.stringify({ reason: 'Manual flag' }) });
        load();
    };

    return (
        <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <h2 style={{ fontSize: 22, fontWeight: 600 }}>Wine Database ({total})</h2>
                <div style={{ display: 'flex', gap: 8 }}>
                    <input value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} placeholder="Search wines..." style={{ width: 250 }} />
                    <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ Add Wine</button>
                </div>
            </div>
            <div className="card" style={{ padding: 0, overflow: 'auto' }}>
                <table>
                    <thead><tr><th>Name</th><th>Type</th><th>Producer</th><th>Country</th><th>Vintage</th><th>Completeness</th><th>Method</th><th>Actions</th></tr></thead>
                    <tbody>
                        {wines.map(w => (
                            <tr key={w.id}>
                                <td style={{ fontWeight: 500, maxWidth: 250, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{w.name}</td>
                                <td><span className="badge badge-blue" style={{ textTransform: 'capitalize' }}>{w.wine_type}</span></td>
                                <td style={{ color: '#8e8e93' }}>{w.producer || '-'}</td>
                                <td>{w.country || '-'}</td>
                                <td>{w.vintage || '-'}</td>
                                <td>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                        <div className="progress-bar" style={{ width: 60 }}>
                                            <div className="progress-fill" style={{ width: `${w.completeness || 0}%`, background: (w.completeness||0) > 60 ? '#30d158' : (w.completeness||0) > 30 ? '#ff9f0a' : '#ff453a' }}></div>
                                        </div>
                                        <span style={{ fontSize: 12, color: '#8e8e93' }}>{Math.round(w.completeness || 0)}%</span>
                                    </div>
                                </td>
                                <td><span className={`badge ${w.data_method ? 'badge-green' : 'badge-gray'}`}>{w.data_method || 'none'}</span></td>
                                <td>
                                    <div style={{ display: 'flex', gap: 4 }}>
                                        <button className="btn btn-secondary" style={{ padding: '4px 8px', fontSize: 12 }} onClick={() => setEditWine(w)}>Edit</button>
                                        <button className="btn btn-primary" style={{ padding: '4px 8px', fontSize: 12 }} onClick={() => handleEnrich(w.id)}>Enrich</button>
                                        <button className="btn btn-warning" style={{ padding: '4px 8px', fontSize: 12 }} onClick={() => handleFlag(w.id)}>Flag</button>
                                        <button className="btn btn-danger" style={{ padding: '4px 8px', fontSize: 12 }} onClick={() => handleDelete(w.id)}>Del</button>
                                    </div>
                                </td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
            <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginTop: 12 }}>
                <button className="btn btn-secondary" disabled={page <= 1} onClick={() => setPage(p => p - 1)}>Prev</button>
                <span style={{ padding: '8px 12px', color: '#8e8e93' }}>Page {page} of {Math.ceil(total / perPage) || 1}</span>
                <button className="btn btn-secondary" disabled={page >= Math.ceil(total / perPage)} onClick={() => setPage(p => p + 1)}>Next</button>
            </div>
            {(editWine || showAdd) && <WineModal wine={editWine} onClose={() => { setEditWine(null); setShowAdd(false); }} onSave={load} />}
        </div>
    );
}

function WineModal({ wine, onClose, onSave }) {
    const [form, setForm] = useState(wine || { name: '', wine_type: 'red', producer: '', vintage: '', region: '', country: '', grape_variety: '' });
    const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
    const save = async () => {
        try {
            if (wine) await api(`/wines/${wine.id}`, { method: 'PUT', body: JSON.stringify(form) });
            else await api('/wines', { method: 'POST', body: JSON.stringify(form) });
            onSave();
            onClose();
        } catch (e) { alert(e.message); }
    };
    return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }} onClick={onClose}>
            <div className="card" style={{ width: 500, maxHeight: '80vh', overflow: 'auto' }} onClick={e => e.stopPropagation()}>
                <h3 style={{ marginBottom: 16 }}>{wine ? 'Edit Wine' : 'Add Wine'}</h3>
                {['name', 'producer', 'region', 'country', 'grape_variety', 'classification'].map(f => (
                    <div key={f} style={{ marginBottom: 10 }}>
                        <label style={{ fontSize: 12, color: '#8e8e93', textTransform: 'capitalize' }}>{f.replace('_', ' ')}</label>
                        <input value={form[f] || ''} onChange={e => set(f, e.target.value)} />
                    </div>
                ))}
                <div style={{ marginBottom: 10 }}>
                    <label style={{ fontSize: 12, color: '#8e8e93' }}>Wine Type</label>
                    <select value={form.wine_type} onChange={e => set('wine_type', e.target.value)}>
                        {['red', 'white', 'rose', 'sparkling', 'dessert', 'fortified'].map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                </div>
                <div style={{ marginBottom: 10 }}>
                    <label style={{ fontSize: 12, color: '#8e8e93' }}>Vintage</label>
                    <input type="number" value={form.vintage || ''} onChange={e => set('vintage', parseInt(e.target.value) || null)} />
                </div>
                <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
                    <button className="btn btn-primary" onClick={save}>Save</button>
                    <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
                </div>
            </div>
        </div>
    );
}

// ============================================================================
// CRAWLER PAGE
// ============================================================================
function CrawlerPage() {
    const [status, setStatus] = useState(null);
    const [query, setQuery] = useState('');
    const [target, setTarget] = useState('all_unenriched');
    const [loading, setLoading] = useState(false);

    const loadStatus = () => api('/crawler/status').then(setStatus).catch(console.error);
    useEffect(() => { loadStatus(); const iv = setInterval(loadStatus, 10000); return () => clearInterval(iv); }, []);

    const startCrawl = async () => {
        setLoading(true);
        try {
            const r = await api('/crawler/start', { method: 'POST', body: JSON.stringify({ query, target }) });
            alert(r.message);
            loadStatus();
        } catch (e) { alert(e.message); }
        setLoading(false);
    };
    const stopCrawl = async () => {
        const r = await api('/crawler/stop', { method: 'POST' });
        alert(r.message);
        loadStatus();
    };

    return (
        <div>
            <h2 style={{ fontSize: 22, fontWeight: 600, marginBottom: 20 }}>Crawler Control</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 20 }}>
                <div className="stat-card">
                    <div className="stat-label">Active Crawls</div>
                    <div className="stat-value" style={{ color: status?.active_crawls ? '#0a84ff' : '#8e8e93' }}>{status?.active_crawls || 0}</div>
                </div>
                <div className="stat-card">
                    <div className="stat-label">Completed</div>
                    <div className="stat-value" style={{ color: '#30d158' }}>{status?.completed_crawls || 0}</div>
                </div>
                <div className="stat-card">
                    <div className="stat-label">SearXNG</div>
                    <div className="stat-value" style={{ fontSize: 18 }}>
                        <span className={`badge ${status?.searxng_status === 'connected' ? 'badge-green' : 'badge-red'}`}>{status?.searxng_status || '...'}</span>
                    </div>
                </div>
            </div>
            <div className="card" style={{ marginBottom: 20 }}>
                <h3 style={{ marginBottom: 12 }}>Start New Crawl</h3>
                <div style={{ marginBottom: 12 }}>
                    <label style={{ fontSize: 12, color: '#8e8e93' }}>Target</label>
                    <select value={target} onChange={e => setTarget(e.target.value)}>
                        <option value="all_unenriched">All Unenriched Wines</option>
                        <option value="custom">Custom Search Query</option>
                    </select>
                </div>
                {target === 'custom' && (
                    <div style={{ marginBottom: 12 }}>
                        <label style={{ fontSize: 12, color: '#8e8e93' }}>Search Query</label>
                        <input value={query} onChange={e => setQuery(e.target.value)} placeholder="e.g. Barolo 2019" />
                    </div>
                )}
                <div style={{ display: 'flex', gap: 8 }}>
                    <button className="btn btn-primary" onClick={startCrawl} disabled={loading}>{loading ? 'Starting...' : 'Start Crawl'}</button>
                    <button className="btn btn-danger" onClick={stopCrawl} disabled={!status?.active_crawls}>Stop All</button>
                </div>
            </div>
            {status?.last_crawl && (
                <div className="card">
                    <h3 style={{ marginBottom: 8 }}>Last Crawl</h3>
                    <div style={{ fontSize: 13, color: '#8e8e93' }}>
                        <div>Type: {status.last_crawl.wine_name}</div>
                        <div>Status: <span className={`badge ${status.last_crawl.status === 'completed' ? 'badge-green' : status.last_crawl.status === 'running' ? 'badge-blue' : 'badge-gray'}`}>{status.last_crawl.status}</span></div>
                        <div>Created: {new Date(status.last_crawl.created_at).toLocaleString()}</div>
                    </div>
                </div>
            )}
        </div>
    );
}

// ============================================================================
// CHAT PAGE
// ============================================================================
function ChatPage() {
    const [messages, setMessages] = useState([{ role: 'assistant', content: 'Hello! I\'m the vinosomm.ai assistant. Ask me about wines in the database, wine knowledge, or data quality.' }]);
    const [input, setInput] = useState('');
    const [loading, setLoading] = useState(false);
    const messagesEnd = useRef(null);
    useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

    const send = async () => {
        if (!input.trim() || loading) return;
        const msg = input.trim();
        setInput('');
        setMessages(prev => [...prev, { role: 'user', content: msg }]);
        setLoading(true);
        try {
            const data = await api('/chat', {
                method: 'POST',
                body: JSON.stringify({ message: msg, history: messages.slice(-10) }),
            });
            setMessages(prev => [...prev, { role: 'assistant', content: data.response }]);
        } catch (e) {
            setMessages(prev => [...prev, { role: 'assistant', content: `Error: ${e.message}` }]);
        }
        setLoading(false);
    };

    return (
        <div style={{ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 40px)' }}>
            <h2 style={{ fontSize: 22, fontWeight: 600, marginBottom: 12 }}>AI Chat (Ollama)</h2>
            <div className="card" style={{ flex: 1, overflow: 'auto', marginBottom: 12, display: 'flex', flexDirection: 'column', gap: 4 }}>
                {messages.map((m, i) => (
                    <div key={i} style={{ display: 'flex' }}>
                        <div className={`chat-msg ${m.role === 'user' ? 'chat-user' : 'chat-ai'}`}>
                            {m.content}
                        </div>
                    </div>
                ))}
                {loading && <div style={{ color: '#8e8e93', fontSize: 13, padding: 8 }}>Thinking...</div>}
                <div ref={messagesEnd} />
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
                <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} placeholder="Ask about wines..." style={{ flex: 1 }} />
                <button className="btn btn-primary" onClick={send} disabled={loading}>Send</button>
            </div>
        </div>
    );
}

// ============================================================================
// REVIEW QUEUE PAGE
// ============================================================================
function ReviewPage() {
    const [wines, setWines] = useState([]);
    const [total, setTotal] = useState(0);
    const [page, setPage] = useState(1);

    const load = useCallback(() => {
        api(`/review?page=${page}`).then(d => { setWines(d.wines); setTotal(d.total); }).catch(console.error);
    }, [page]);
    useEffect(load, [load]);

    const approve = async (id) => {
        await api(`/review/${id}/approve`, { method: 'POST' });
        load();
    };
    const reject = async (id) => {
        const reason = prompt('Rejection reason:');
        if (reason === null) return;
        await api(`/review/${id}/reject`, { method: 'POST', body: JSON.stringify({ reason }) });
        load();
    };

    return (
        <div>
            <h2 style={{ fontSize: 22, fontWeight: 600, marginBottom: 20 }}>Review Queue ({total})</h2>
            {wines.length === 0 ? (
                <div className="card" style={{ textAlign: 'center', padding: 40, color: '#8e8e93' }}>No wines pending review</div>
            ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                    {wines.map(w => (
                        <div key={w.id} className="card">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                <div>
                                    <h3 style={{ fontSize: 16, fontWeight: 600 }}>{w.name}</h3>
                                    <div style={{ fontSize: 13, color: '#8e8e93', marginTop: 4 }}>
                                        {w.producer && <span>{w.producer} &middot; </span>}
                                        {w.vintage && <span>{w.vintage} &middot; </span>}
                                        {w.region && <span>{w.region} &middot; </span>}
                                        {w.country}
                                    </div>
                                    {w.review_notes && <div style={{ fontSize: 12, color: '#ff9f0a', marginTop: 4 }}>Note: {w.review_notes}</div>}
                                    <div style={{ display: 'flex', gap: 16, marginTop: 8, fontSize: 13, color: '#8e8e93' }}>
                                        <span>Completeness: {Math.round(w.completeness || 0)}%</span>
                                        <span>Confidence: {w.avg_confidence ? Math.round(w.avg_confidence * 100) + '%' : 'N/A'}</span>
                                        <span>Sources: {w.source_count || 0}</span>
                                        <span>Method: {w.data_method || 'none'}</span>
                                    </div>
                                </div>
                                <div style={{ display: 'flex', gap: 8 }}>
                                    <button className="btn btn-success" onClick={() => approve(w.id)}>Approve</button>
                                    <button className="btn btn-danger" onClick={() => reject(w.id)}>Reject</button>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

// ============================================================================
// TASKS PAGE
// ============================================================================
function TasksPage() {
    const [tasks, setTasks] = useState([]);
    const [total, setTotal] = useState(0);
    const [page, setPage] = useState(1);
    const [filter, setFilter] = useState('');

    const load = useCallback(() => {
        let q = `/tasks?page=${page}`;
        if (filter) q += `&status_filter=${filter}`;
        api(q).then(d => { setTasks(d.tasks); setTotal(d.total); }).catch(console.error);
    }, [page, filter]);
    useEffect(load, [load]);
    useEffect(() => { const iv = setInterval(load, 8000); return () => clearInterval(iv); }, [load]);

    const cancel = async (id) => { await api(`/tasks/${id}/cancel`, { method: 'POST' }); load(); };
    const clear = async (type) => { await api('/tasks/clear', { method: 'POST', body: JSON.stringify({ type }) }); load(); };

    const statusColor = { queued: 'badge-yellow', running: 'badge-blue', completed: 'badge-green', failed: 'badge-red', cancelled: 'badge-gray' };

    return (
        <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <h2 style={{ fontSize: 22, fontWeight: 600 }}>Task Monitor ({total})</h2>
                <div style={{ display: 'flex', gap: 8 }}>
                    <select value={filter} onChange={e => { setFilter(e.target.value); setPage(1); }} style={{ width: 150 }}>
                        <option value="">All</option>
                        <option value="queued">Queued</option>
                        <option value="running">Running</option>
                        <option value="completed">Completed</option>
                        <option value="failed">Failed</option>
                    </select>
                    <button className="btn btn-secondary" onClick={() => clear('completed')}>Clear Done</button>
                    <button className="btn btn-danger" onClick={() => clear('all')}>Clear All</button>
                </div>
            </div>
            <div className="card" style={{ padding: 0 }}>
                <table>
                    <thead><tr><th>ID</th><th>Type</th><th>Wine</th><th>Status</th><th>Created</th><th>Duration</th><th>Actions</th></tr></thead>
                    <tbody>
                        {tasks.map(t => {
                            const dur = t.started_at && t.completed_at ? Math.round((new Date(t.completed_at) - new Date(t.started_at)) / 1000) + 's' : t.started_at ? 'running...' : '-';
                            return (
                                <tr key={t.id}>
                                    <td style={{ color: '#8e8e93' }}>#{t.id}</td>
                                    <td><span className="badge badge-blue">{t.task_type}</span></td>
                                    <td style={{ maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.wine_name || '-'}</td>
                                    <td><span className={`badge ${statusColor[t.status] || 'badge-gray'}`}>{t.status}</span></td>
                                    <td style={{ fontSize: 12, color: '#8e8e93' }}>{t.created_at ? new Date(t.created_at).toLocaleString() : '-'}</td>
                                    <td style={{ fontSize: 12 }}>{dur}</td>
                                    <td>
                                        {['queued', 'running'].includes(t.status) && (
                                            <button className="btn btn-danger" style={{ padding: '4px 8px', fontSize: 12 }} onClick={() => cancel(t.id)}>Cancel</button>
                                        )}
                                        {t.error && <span style={{ fontSize: 11, color: '#ff453a' }} title={t.error}>Error</span>}
                                    </td>
                                </tr>
                            );
                        })}
                        {tasks.length === 0 && <tr><td colSpan={7} style={{ textAlign: 'center', color: '#8e8e93', padding: 20 }}>No tasks</td></tr>}
                    </tbody>
                </table>
            </div>
        </div>
    );
}

// ============================================================================
// STATS PAGE
// ============================================================================
function StatsPage() {
    const [stats, setStats] = useState(null);
    useEffect(() => { api('/stats').then(setStats).catch(console.error); }, []);
    if (!stats) return <div style={{ padding: 20, color: '#8e8e93' }}>Loading stats...</div>;

    const BarViz = ({ data, maxVal, color }) => (
        <div>
            {Object.entries(data).map(([label, val]) => (
                <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                    <span style={{ width: 100, fontSize: 12, color: '#8e8e93', textAlign: 'right', flexShrink: 0 }}>{label}</span>
                    <div style={{ flex: 1, height: 18, background: '#2c2c2e', borderRadius: 4, overflow: 'hidden' }}>
                        <div style={{ height: '100%', width: `${Math.max((val / (maxVal || 1)) * 100, 2)}%`, background: color, borderRadius: 4, transition: 'width 0.5s' }}></div>
                    </div>
                    <span style={{ fontSize: 12, width: 30, textAlign: 'right' }}>{val}</span>
                </div>
            ))}
        </div>
    );

    const maxType = Math.max(...Object.values(stats.by_type || {}), 1);
    const maxCountry = Math.max(...Object.values(stats.by_country || {}), 1);
    const maxComp = Math.max(...Object.values(stats.completeness_distribution || {}), 1);

    return (
        <div>
            <h2 style={{ fontSize: 22, fontWeight: 600, marginBottom: 20 }}>Statistics & Analytics</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 20 }}>
                <div className="stat-card"><div className="stat-label">Total Wines</div><div className="stat-value">{stats.total}</div></div>
                <div className="stat-card"><div className="stat-label">Enriched</div><div className="stat-value" style={{ color: '#30d158' }}>{stats.enriched}</div></div>
                <div className="stat-card"><div className="stat-label">Unenriched</div><div className="stat-value" style={{ color: '#ff9f0a' }}>{stats.unenriched}</div></div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
                <div className="card">
                    <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>By Wine Type</h3>
                    <BarViz data={stats.by_type} maxVal={maxType} color="#0a84ff" />
                </div>
                <div className="card">
                    <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>By Country</h3>
                    <BarViz data={stats.by_country} maxVal={maxCountry} color="#30d158" />
                </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
                <div className="card">
                    <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>Completeness Distribution</h3>
                    <BarViz data={stats.completeness_distribution} maxVal={maxComp} color="#ff9f0a" />
                </div>
                <div className="card">
                    <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>Average Taste Scores</h3>
                    {Object.entries(stats.avg_scores || {}).map(([dim, val]) => (
                        <div key={dim} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                            <span style={{ width: 100, fontSize: 12, color: '#8e8e93', textAlign: 'right', textTransform: 'capitalize' }}>{dim}</span>
                            <div style={{ flex: 1, height: 8, background: '#2c2c2e', borderRadius: 4, overflow: 'hidden' }}>
                                <div style={{ height: '100%', width: `${(val / 5) * 100}%`, background: '#bf5af2', borderRadius: 4 }}></div>
                            </div>
                            <span style={{ fontSize: 12, width: 30, textAlign: 'right' }}>{val.toFixed(1)}</span>
                        </div>
                    ))}
                </div>
            </div>
            <div className="card">
                <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>Data Methods</h3>
                <BarViz data={stats.by_method} maxVal={Math.max(...Object.values(stats.by_method || {}), 1)} color="#bf5af2" />
            </div>
        </div>
    );
}

// ============================================================================
// SETTINGS PAGE
// ============================================================================
function SettingsPage() {
    const [settings, setSettings] = useState({});
    const [saving, setSaving] = useState(false);
    const [msg, setMsg] = useState('');

    useEffect(() => { api('/settings').then(d => setSettings(d.settings)).catch(console.error); }, []);

    const save = async () => {
        setSaving(true);
        try {
            await api('/settings', { method: 'PUT', body: JSON.stringify({ settings }) });
            setMsg('Settings saved!');
            setTimeout(() => setMsg(''), 3000);
        } catch (e) { setMsg('Error: ' + e.message); }
        setSaving(false);
    };

    const labels = {
        ollama_model: 'Ollama Model',
        ollama_url: 'Ollama URL',
        searxng_url: 'SearXNG URL',
        enrichment_batch_size: 'Enrichment Batch Size',
        enrichment_schedule: 'Enrichment Schedule',
        auto_review_threshold: 'Auto-Review Confidence Threshold',
        max_concurrent_tasks: 'Max Concurrent Tasks',
    };

    return (
        <div>
            <h2 style={{ fontSize: 22, fontWeight: 600, marginBottom: 20 }}>Settings</h2>
            <div className="card">
                {Object.entries(settings).map(([key, value]) => (
                    <div key={key} style={{ marginBottom: 16 }}>
                        <label style={{ fontSize: 13, color: '#8e8e93', marginBottom: 4, display: 'block' }}>{labels[key] || key}</label>
                        <input value={value} onChange={e => setSettings(s => ({ ...s, [key]: e.target.value }))} />
                    </div>
                ))}
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? 'Saving...' : 'Save Settings'}</button>
                    {msg && <span style={{ fontSize: 13, color: msg.startsWith('Error') ? '#ff453a' : '#30d158' }}>{msg}</span>}
                </div>
            </div>
        </div>
    );
}

// ============================================================================
// APP SHELL
// ============================================================================
function App() {
    const [user, setUser] = useState(localStorage.getItem('token') ? 'admin' : null);
    const [route, setRoute] = useState(window.location.hash || '#/dashboard');

    useEffect(() => {
        const onHash = () => setRoute(window.location.hash || '#/dashboard');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
    }, []);

    useEffect(() => {
        if (!user && route !== '#/login') {
            window.location.hash = '#/login';
            setRoute('#/login');
        }
    }, [user, route]);

    const logout = () => { localStorage.removeItem('token'); setUser(null); window.location.hash = '#/login'; };

    if (!user) return <LoginPage onLogin={setUser} />;

    const navItems = [
        { hash: '#/dashboard', icon: '\uD83D\uDCCA', label: 'Dashboard' },
        { hash: '#/wines', icon: '\uD83C\uDF77', label: 'Wines' },
        { hash: '#/crawler', icon: '\uD83D\uDD77\uFE0F', label: 'Crawler' },
        { hash: '#/chat', icon: '\uD83E\uDD16', label: 'AI Chat' },
        { hash: '#/review', icon: '\u2705', label: 'Review' },
        { hash: '#/tasks', icon: '\u2699\uFE0F', label: 'Tasks' },
        { hash: '#/stats', icon: '\uD83D\uDCC8', label: 'Stats' },
        { hash: '#/settings', icon: '\uD83D\uDD27', label: 'Settings' },
    ];

    const pages = {
        '#/dashboard': DashboardPage,
        '#/wines': WinesPage,
        '#/crawler': CrawlerPage,
        '#/chat': ChatPage,
        '#/review': ReviewPage,
        '#/tasks': TasksPage,
        '#/stats': StatsPage,
        '#/settings': SettingsPage,
    };
    const Page = pages[route] || DashboardPage;

    return (
        <div style={{ display: 'flex', minHeight: '100vh' }}>
            <nav style={{ width: 180, background: '#0a0a0a', borderRight: '1px solid #1c1c1e', padding: '16px 8px', flexShrink: 0, display: 'flex', flexDirection: 'column' }}>
                <div style={{ marginBottom: 20, padding: '0 12px' }}>
                    <div style={{ fontSize: 11, color: '#8e8e93' }}>Logged in as</div>
                    <div style={{ fontWeight: 600 }}>{user}</div>
                    <button className="btn btn-secondary" style={{ width: '100%', marginTop: 8, fontSize: 12, padding: '6px 0' }} onClick={logout}>Logout</button>
                </div>
                {navItems.map(n => (
                    <a key={n.hash} href={n.hash} className={`nav-item ${route === n.hash ? 'active' : ''}`} style={{ textDecoration: 'none' }}>
                        <span>{n.icon}</span> {n.label}
                    </a>
                ))}
            </nav>
            <main style={{ flex: 1, padding: 20, overflow: 'auto' }}>
                <Page />
            </main>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
