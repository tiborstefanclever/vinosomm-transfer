<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vinosomm.ai Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <style>
        * {
            --color-bg-primary: #000000;
            --color-bg-card: #1C1C1E;
            --color-bg-elevated: #2C2C2E;
            --color-bg-tertiary: #3A3A3C;
            --color-accent-blue: #0A84FF;
            --color-accent-green: #30D158;
            --color-accent-red: #FF453A;
            --color-accent-yellow: #FFD60A;
            --color-text-primary: #FFFFFF;
            --color-text-secondary: #8E8E93;
            --color-text-tertiary: #636366;
            --color-border: #38383A;
        }

        body {
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }

        #root {
            width: 100%;
            height: 100vh;
        }

        .card {
            background-color: var(--color-bg-card);
            border-radius: 12px;
            border: 1px solid var(--color-border);
            padding: 16px;
            transition: all 0.2s ease;
        }

        .card:hover {
            background-color: var(--color-bg-elevated);
            border-color: #48484A;
        }

        .button-primary {
            background-color: var(--color-accent-blue);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .button-primary:hover {
            background-color: #0071E3;
        }

        .button-secondary {
            background-color: var(--color-bg-elevated);
            color: var(--color-text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .button-secondary:hover {
            background-color: var(--color-bg-tertiary);
        }

        .input-field {
            background-color: var(--color-bg-elevated);
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--color-accent-blue);
            background-color: var(--color-bg-tertiary);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background-color: rgba(48, 209, 88, 0.2);
            color: var(--color-accent-green);
        }

        .badge-warning {
            background-color: rgba(255, 214, 10, 0.2);
            color: var(--color-accent-yellow);
        }

        .badge-danger {
            background-color: rgba(255, 69, 58, 0.2);
            color: var(--color-accent-red);
        }

        .badge-info {
            background-color: rgba(10, 132, 255, 0.2);
            color: var(--color-accent-blue);
        }

        .sidebar {
            background-color: var(--color-bg-card);
            border-right: 1px solid var(--color-border);
            padding: 16px 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 12px 16px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
            color: var(--color-text-secondary);
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: var(--color-bg-elevated);
            border-left-color: var(--color-accent-blue);
            color: var(--color-text-primary);
        }

        .content {
            overflow-y: auto;
            height: 100vh;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .table th {
            background-color: var(--color-bg-elevated);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--color-text-secondary);
            border-bottom: 1px solid var(--color-border);
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text-primary);
        }

        .table tr:hover {
            background-color: var(--color-bg-elevated);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--color-border);
        }

        .modal-body {
            margin: 16px 0;
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--color-border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--color-text-secondary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--color-border);
            border-top-color: var(--color-accent-blue);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert-success {
            background-color: rgba(48, 209, 88, 0.1);
            border: 1px solid rgba(48, 209, 88, 0.3);
            color: var(--color-accent-green);
        }

        .alert-error {
            background-color: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.3);
            color: var(--color-accent-red);
        }

        .alert-info {
            background-color: rgba(10, 132, 255, 0.1);
            border: 1px solid rgba(10, 132, 255, 0.3);
            color: var(--color-accent-blue);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background-color: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 16px;
        }

        .stat-card h3 {
            margin: 0 0 8px 0;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
        }

        .pagination button {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--color-border);
            background-color: var(--color-bg-elevated);
            color: var(--color-text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .pagination button:hover {
            background-color: var(--color-bg-tertiary);
            border-color: var(--color-accent-blue);
        }

        .pagination button.active {
            background-color: var(--color-accent-blue);
            border-color: var(--color-accent-blue);
            color: white;
        }

        .pagination span {
            color: var(--color-text-secondary);
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .empty-state-message {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .chart-container {
            background-color: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .chart-container h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

        const API_BASE = '/admin/api';
        let TOKEN = localStorage.getItem('admin_token');

        // Auth helper
        const apiCall = async (method, endpoint, data = null) => {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${TOKEN}`,
                },
            };
            if (data) options.body = JSON.stringify(data);
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            if (res.status === 401) {
                TOKEN = null;
                localStorage.removeItem('admin_token');
                window.location.href = window.location.pathname;
            }
            return res.json();
        };

        // Login page
        const LoginPage = ({ onLogin }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password }),
                    });
                    const data = await res.json();
                    if (res.ok) {
                        TOKEN = data.access_token;
                        localStorage.setItem('admin_token', TOKEN);
                        onLogin();
                    } else {
                        setError(data.detail || 'Login failed');
                    }
                } catch (err) {
                    setError('Network error');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' }}>
                    <div style={{ width: '100%', maxWidth: '400px', padding: '24px' }}>
                        <div style={{ textAlign: 'center', marginBottom: '32px' }}>
                            <h1 style={{ margin: '0 0 8px 0', fontSize: '28px' }}>vinosomm.ai</h1>
                            <p style={{ margin: '0', color: 'var(--color-text-secondary)', fontSize: '14px' }}>Admin Panel</p>
                        </div>
                        {error && <div className="alert alert-error">{error}</div>}
                        <form onSubmit={handleLogin}>
                            <div className="form-group">
                                <label>Username</label>
                                <input
                                    type="text"
                                    className="input-field"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    placeholder="Enter username"
                                    disabled={loading}
                                />
                            </div>
                            <div className="form-group">
                                <label>Password</label>
                                <input
                                    type="password"
                                    className="input-field"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="Enter password"
                                    disabled={loading}
                                />
                            </div>
                            <button type="submit" className="button-primary" style={{ width: '100%' }} disabled={loading}>
                                {loading ? <span className="spinner" style={{ marginRight: '8px' }}></span> : null}
                                {loading ? 'Signing in...' : 'Sign In'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // Dashboard page
        const Dashboard = ({ user, onLogout }) => {
            const [activePage, setActivePage] = useState('dashboard');
            const [dashboard, setDashboard] = useState(null);
            const [wines, setWines] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [wineModal, setWineModal] = useState(false);
            const [selectedWine, setSelectedWine] = useState(null);
            const [page, setPage] = useState(1);
            const [totalPages, setTotalPages] = useState(1);
            const [searchTerm, setSearchTerm] = useState('');
            const [wineForm, setWineForm] = useState({
                name: '',
                producer: '',
                wine_type: 'Red',
                vintage: '',
                country: '',
                region: '',
                grape_variety: '',
                classification: '',
                alcohol: '',
                price: '',
                currency: 'USD',
                rating: '',
            });

            useEffect(() => {
                loadDashboard();
            }, []);

            useEffect(() => {
                if (activePage === 'wines') loadWines();
                if (activePage === 'tasks') loadTasks();
            }, [activePage, page]);

            const loadDashboard = async () => {
                try {
                    const data = await apiCall('GET', '/dashboard');
                    setDashboard(data);
                } catch (err) {
                    setError('Failed to load dashboard');
                }
            };

            const loadWines = async () => {
                setLoading(true);
                try {
                    const params = new URLSearchParams({
                        page,
                        per_page: 10,
                        ...(searchTerm && { search: searchTerm }),
                    });
                    const data = await apiCall('GET', `/wines?${params}`);
                    setWines(data.wines);
                    setTotalPages(data.total_pages);
                } catch (err) {
                    setError('Failed to load wines');
                } finally {
                    setLoading(false);
                }
            };

            const loadTasks = async () => {
                setLoading(true);
                try {
                    const data = await apiCall('GET', `/tasks?page=${page}&per_page=10`);
                    setTasks(data.tasks);
                    setTotalPages(data.total_pages);
                } catch (err) {
                    setError('Failed to load tasks');
                } finally {
                    setLoading(false);
                }
            };

            const handleCreateWine = async (e) => {
                e.preventDefault();
                try {
                    await apiCall('POST', '/wines', wineForm);
                    setSuccess('Wine created successfully');
                    setWineForm({
                        name: '',
                        producer: '',
                        wine_type: 'Red',
                        vintage: '',
                        country: '',
                        region: '',
                        grape_variety: '',
                        classification: '',
                        alcohol: '',
                        price: '',
                        currency: 'USD',
                        rating: '',
                    });
                    setWineModal(false);
                    setPage(1);
                    loadWines();
                    setTimeout(() => setSuccess(''), 3000);
                } catch (err) {
                    setError('Failed to create wine');
                }
            };

            const handleDeleteWine = async (wineId) => {
                if (confirm('Are you sure you want to delete this wine?')) {
                    try {
                        await apiCall('DELETE', `/wines/${wineId}`);
                        setSuccess('Wine deleted successfully');
                        loadWines();
                        setTimeout(() => setSuccess(''), 3000);
                    } catch (err) {
                        setError('Failed to delete wine');
                    }
                }
            };

            const handleEnrichWine = async (wineId) => {
                try {
                    await apiCall('POST', `/enrich/${wineId}`);
                    setSuccess('Enrichment task created');
                    loadTasks();
                    setTimeout(() => setSuccess(''), 3000);
                } catch (err) {
                    setError('Failed to create enrichment task');
                }
            };

            const DashboardView = () => (
                <div>
                    <div className="header">
                        <h1>Dashboard</h1>
                    </div>
                    {dashboard && (
                        <>
                            <div className="stats-grid">
                                <div className="stat-card">
                                    <h3>Total Wines</h3>
                                    <div className="value">{dashboard.total_wines}</div>
                                </div>
                                <div className="stat-card">
                                    <h3>Added Today</h3>
                                    <div className="value">{dashboard.wines_added_today}</div>
                                </div>
                                <div className="stat-card">
                                    <h3>Added This Week</h3>
                                    <div className="value">{dashboard.wines_added_this_week}</div>
                                </div>
                                <div className="stat-card">
                                    <h3>Avg Completeness</h3>
                                    <div className="value">{(dashboard.avg_completeness * 100).toFixed(0)}%</div>
                                </div>
                            </div>
                            <div className="stats-grid">
                                <div className="chart-container" style={{ gridColumn: '1 / -1' }}>
                                    <h3>Wines by Type</h3>
                                    <ResponsiveContainer width="100%" height={300}>
                                        <BarChart data={Object.entries(dashboard.wines_by_type).map(([type, count]) => ({ name: type, count }))}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="var(--color-border)" />
                                            <XAxis dataKey="name" stroke="var(--color-text-secondary)" />
                                            <YAxis stroke="var(--color-text-secondary)" />
                                            <Tooltip contentStyle={{ backgroundColor: 'var(--color-bg-card)', border: '1px solid var(--color-border)', borderRadius: '8px' }} />
                                            <Bar dataKey="count" fill="var(--color-accent-blue)" />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );

            const WinesView = () => (
                <div>
                    <div className="header">
                        <h1>Wines</h1>
                        <button className="button-primary" onClick={() => setWineModal(true)}>Add Wine</button>
                    </div>
                    <div style={{ marginBottom: '16px' }}>
                        <input
                            type="text"
                            className="input-field"
                            placeholder="Search wines..."
                            value={searchTerm}
                            onChange={(e) => {
                                setSearchTerm(e.target.value);
                                setPage(1);
                            }}
                            onKeyPress={(e) => e.key === 'Enter' && loadWines()}
                            style={{ maxWidth: '300px' }}
                        />
                    </div>
                    {wines.length === 0 ? (
                        <div className="empty-state">
                            <div className="empty-state-icon">🍷</div>
                            <div className="empty-state-title">No wines found</div>
                            <div className="empty-state-message">Create your first wine to get started</div>
                        </div>
                    ) : (
                        <div>
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Producer</th>
                                        <th>Type</th>
                                        <th>Country</th>
                                        <th>Rating</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {wines.map(wine => (
                                        <tr key={wine.id}>
                                            <td>{wine.name}</td>
                                            <td>{wine.producer || '-'}</td>
                                            <td><span className="badge badge-info">{wine.wine_type}</span></td>
                                            <td>{wine.country || '-'}</td>
                                            <td>{wine.rating ? wine.rating.toFixed(1) : '-'}</td>
                                            <td>
                                                <button
                                                    className="button-secondary"
                                                    style={{ marginRight: '8px', fontSize: '12px', padding: '4px 8px' }}
                                                    onClick={() => handleEnrichWine(wine.id)}
                                                >
                                                    Enrich
                                                </button>
                                                <button
                                                    className="button-secondary"
                                                    style={{ fontSize: '12px', padding: '4px 8px', color: 'var(--color-accent-red)' }}
                                                    onClick={() => handleDeleteWine(wine.id)}
                                                >
                                                    Delete
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {totalPages > 1 && (
                                <div className="pagination">
                                    <button onClick={() => setPage(Math.max(1, page - 1))} disabled={page === 1}>
                                        Previous
                                    </button>
                                    <span>Page {page} of {totalPages}</span>
                                    <button onClick={() => setPage(Math.min(totalPages, page + 1))} disabled={page === totalPages}>
                                        Next
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );

            const TasksView = () => (
                <div>
                    <div className="header">
                        <h1>Enrichment Tasks</h1>
                        <button className="button-secondary" onClick={loadTasks}>Refresh</button>
                    </div>
                    {tasks.length === 0 ? (
                        <div className="empty-state">
                            <div className="empty-state-icon">⚙️</div>
                            <div className="empty-state-title">No tasks</div>
                            <div className="empty-state-message">Enrichment tasks will appear here</div>
                        </div>
                    ) : (
                        <div>
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>Wine</th>
                                        <th>Type</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {tasks.map(task => (
                                        <tr key={task.id}>
                                            <td>{task.wine_name}</td>
                                            <td>{task.task_type}</td>
                                            <td>
                                                <span className={`badge badge-${task.status === 'completed' ? 'success' : task.status === 'queued' ? 'info' : 'danger'}`}>
                                                    {task.status}
                                                </span>
                                            </td>
                                            <td>{new Date(task.created_at).toLocaleString()}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {totalPages > 1 && (
                                <div className="pagination">
                                    <button onClick={() => setPage(Math.max(1, page - 1))} disabled={page === 1}>
                                        Previous
                                    </button>
                                    <span>Page {page} of {totalPages}</span>
                                    <button onClick={() => setPage(Math.min(totalPages, page + 1))} disabled={page === totalPages}>
                                        Next
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );

            const WineModal = () => (
                <div className={`modal ${wineModal ? 'active' : ''}`}>
                    <div className="modal-content">
                        <div className="modal-header">Add New Wine</div>
                        {error && <div className="alert alert-error">{error}</div>}
                        <form onSubmit={handleCreateWine}>
                            <div className="modal-body">
                                <div className="form-group">
                                    <label>Wine Name *</label>
                                    <input
                                        type="text"
                                        className="input-field"
                                        value={wineForm.name}
                                        onChange={(e) => setWineForm({ ...wineForm, name: e.target.value })}
                                        required
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Producer</label>
                                    <input
                                        type="text"
                                        className="input-field"
                                        value={wineForm.producer}
                                        onChange={(e) => setWineForm({ ...wineForm, producer: e.target.value })}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Type *</label>
                                    <select
                                        className="input-field"
                                        value={wineForm.wine_type}
                                        onChange={(e) => setWineForm({ ...wineForm, wine_type: e.target.value })}
                                    >
                                        <option>Red</option>
                                        <option>White</option>
                                        <option>Rosé</option>
                                        <option>Sparkling</option>
                                        <option>Dessert</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Vintage</label>
                                    <input
                                        type="number"
                                        className="input-field"
                                        value={wineForm.vintage}
                                        onChange={(e) => setWineForm({ ...wineForm, vintage: e.target.value })}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Country</label>
                                    <input
                                        type="text"
                                        className="input-field"
                                        value={wineForm.country}
                                        onChange={(e) => setWineForm({ ...wineForm, country: e.target.value })}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Region</label>
                                    <input
                                        type="text"
                                        className="input-field"
                                        value={wineForm.region}
                                        onChange={(e) => setWineForm({ ...wineForm, region: e.target.value })}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Grape Variety</label>
                                    <input
                                        type="text"
                                        className="input-field"
                                        value={wineForm.grape_variety}
                                        onChange={(e) => setWineForm({ ...wineForm, grape_variety: e.target.value })}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Alcohol %</label>
                                    <input
                                        type="number"
                                        className="input-field"
                                        value={wineForm.alcohol}
                                        onChange={(e) => setWineForm({ ...wineForm, alcohol: e.target.value })}
                                        step="0.1"
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Price</label>
                                    <input
                                        type="number"
                                        className="input-field"
                                        value={wineForm.price}
                                        onChange={(e) => setWineForm({ ...wineForm, price: e.target.value })}
                                        step="0.01"
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Rating (0-100)</label>
                                    <input
                                        type="number"
                                        className="input-field"
                                        value={wineForm.rating}
                                        onChange={(e) => setWineForm({ ...wineForm, rating: e.target.value })}
                                        min="0"
                                        max="100"
                                    />
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button
                                    type="button"
                                    className="button-secondary"
                                    onClick={() => setWineModal(false)}
                                >
                                    Cancel
                                </button>
                                <button type="submit" className="button-primary">
                                    Create Wine
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );

            return (
                <div style={{ display: 'flex', height: '100vh' }}>
                    <div className="sidebar" style={{ width: '200px', minWidth: '200px' }}>
                        <div style={{ padding: '16px', borderBottom: '1px solid var(--color-border)', marginBottom: '8px' }}>
                            <div style={{ fontSize: '12px', color: 'var(--color-text-secondary)', marginBottom: '4px' }}>Logged in as</div>
                            <div style={{ fontSize: '14px', fontWeight: '600', marginBottom: '12px' }}>{user}</div>
                            <button className="button-secondary" style={{ width: '100%', fontSize: '12px' }} onClick={onLogout}>
                                Logout
                            </button>
                        </div>
                        <div
                            className={`sidebar-item ${activePage === 'dashboard' ? 'active' : ''}`}
                            onClick={() => { setActivePage('dashboard'); setPage(1); }}
                        >
                            📊 Dashboard
                        </div>
                        <div
                            className={`sidebar-item ${activePage === 'wines' ? 'active' : ''}`}
                            onClick={() => { setActivePage('wines'); setPage(1); }}
                        >
                            🍷 Wines
                        </div>
                        <div
                            className={`sidebar-item ${activePage === 'tasks' ? 'active' : ''}`}
                            onClick={() => { setActivePage('tasks'); setPage(1); }}
                        >
                            ⚙️ Tasks
                        </div>
                    </div>
                    <div className="content" style={{ flex: 1 }}>
                        {success && <div className="alert alert-success">{success}</div>}
                        {error && <div className="alert alert-error">{error}</div>}
                        {activePage === 'dashboard' && <DashboardView />}
                        {activePage === 'wines' && <WinesView />}
                        {activePage === 'tasks' && <TasksView />}
                        <WineModal />
                    </div>
                </div>
            );
        };

        // Main app
        const App = () => {
            const [loggedIn, setLoggedIn] = useState(!!TOKEN);
            const [user, setUser] = useState(null);

            useEffect(() => {
                if (loggedIn && TOKEN) {
                    apiCall('GET', '/auth/me').then(data => setUser(data.username));
                }
            }, [loggedIn]);

            if (!loggedIn) {
                return <LoginPage onLogin={() => setLoggedIn(true)} />;
            }

            return (
                <Dashboard
                    user={user || 'Admin'}
                    onLogout={() => {
                        TOKEN = null;
                        localStorage.removeItem('admin_token');
                        setLoggedIn(false);
                    }}
                />
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
